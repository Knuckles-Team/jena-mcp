version: '3.8'
services:
  mcp:
    init: true
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${MCP_CONTAINER_MEMORY_LIMIT:-2g}
    cpus: ${MCP_CONTAINER_CPU_LIMIT:-1.0}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    build: .
